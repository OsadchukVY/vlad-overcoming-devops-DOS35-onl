version: '3'
services:
  db:
    image: postgres:latest
    ports: 
      - "5432:5432"
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    env_file:
      - .env
    networks:
      - postgres_net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  
  web:
    image: nginx:latest
    container_name: nginx
    networks:
      - postgres_net
    ports:
      - 8080:80
    volumes:
      - /nginx:/etc/nginx/:ro
    depends_on:
      db:
        condition: service_healthy

networks:
  postgres_net:
    driver: bridge
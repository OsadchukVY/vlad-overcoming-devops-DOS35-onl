server {
    listen                  443 ssl http2;
    listen                  [::]:443 ssl http2;
    server_name             tms.by;
    set                     $base /var/www/tms.by;
    root                    $base;
    
    # SSL
    ssl_certificate         /etc/letsencrypt/live/tms.by/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/tms.by/privkey.pem;

    # security
    include                 nginxconfig.io/security.conf;

    # logging
    access_log              /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log               /var/log/nginx/error.log warn;

    # index.php
    index                   index.php;

    # index.php fallback
    location / {
        try_files $uri $uri/ /index.php;
    }

    # additional config
    include nginxconfig.io/general.conf;

    # handle .php
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        include      nginxconfig.io/php_fastcgi.conf;
    }
}

# subdomains redirect
server {
    listen                  443 ssl http2;
    listen                  [::]:443 ssl http2;
    server_name             *.tms.by;

    # SSL
    ssl_certificate         /etc/letsencrypt/live/tms.by/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/tms.by/privkey.pem;

    return  301 https://tms.by$request_uri;
}

# HTTP redirect
server {
    listen      80;
    listen      [::]:80;
    server_name .tms.by;
    include     nginxconfig.io/letsencrypt.conf;

    location / {
        return 301 $host$request_uri;
    }
}
